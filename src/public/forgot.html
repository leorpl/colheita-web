<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NazcaTraker - Recuperar senha</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="bg"><div class="grain"></div><div class="halo"></div></div>

    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="/logo.png" alt="Fazenda Nazca" />
        <div>
          <div class="brand-title">NazcaTraker</div>
          <div class="brand-sub">Recuperar senha</div>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn ghost" href="/institucional" target="_blank" rel="noreferrer">Site institucional</a>
      </div>
    </header>

    <main class="shell" style="grid-template-columns:1fr">
      <section class="panel" style="max-width:520px;margin:0 auto">
        <div class="panel-head">
          <div>
            <div class="panel-title">Esqueci minha senha</div>
            <div class="panel-sub">Informe seu e-mail (login). Se existir, enviaremos um link de redefinição.</div>
          </div>
        </div>
        <div class="panel-body">
          <form class="form-grid" id="forgotForm">
            <div class="field col12">
              <div class="label">E-mail</div>
              <input name="email" autocomplete="username" />
            </div>
            <div class="field col12" style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
              <a class="btn ghost" href="/login">Voltar</a>
              <button class="btn" type="submit">Enviar link</button>
            </div>
            <div class="hint" id="msg"></div>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="/forgot.js"></script>
  </body>
</html>
