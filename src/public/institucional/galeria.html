<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galeria | Fazenda Nazca</title>
    <meta name="description" content="Galeria de fotos da Fazenda Nazca (estrutura pronta para inserir imagens reais por safra e por area)." />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="stylesheet" href="/institucional/site.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450..700&family=Outfit:wght@350..750&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="siteHeader"></div>

    <main class="page">
      <div class="wrap">
        <div class="kicker"><span class="dot" aria-hidden="true"></span><span>Galeria</span></div>
        <h1>Fotos da fazenda</h1>
        <div class="crumb"><a href="/institucional">Home</a> / Galeria</div>

        <div class="section" style="padding-top:18px">
          <div class="section-head">
            <div>
              <h2>Placeholders prontos para trocar por fotos reais</h2>
              <p>Ao adicionar fotos, basta substituir os arquivos em <code style="font-family:var(--mono)">src/public/institucional/assets/</code> e ajustar as legendas.</p>
            </div>
            <a class="btn" href="/institucional/contato">Agendar visita</a>
          </div>

          <div class="gallery" id="galleryGrid" aria-label="Grade de fotos"></div>
          <div class="hint" style="margin-top:12px;color:rgba(255,255,255,.74)">Lista e legendas: <code style="font-family:var(--mono)">src/public/institucional/gallery.json</code></div>
        </div>
      </div>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lb-card" role="dialog" aria-modal="true" aria-label="Visualizador de foto">
        <div class="lb-head">
          <div class="lb-title" id="lbTitle">Foto</div>
          <button id="lbClose" type="button" aria-label="Fechar">×</button>
        </div>
        <div class="lb-body"><img id="lbImg" alt="Foto ampliada" decoding="async" /></div>
      </div>
    </div>

    <div id="siteFooter"></div>
    <script src="/institucional/site.js" type="module"></script>
  </body>
</html>
